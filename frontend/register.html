<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — CineBook</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Cine<span>Book</span></a>
  <div class="nav-links">
    <a href="index.html">Movies</a>
    <a href="login.html" class="btn-nav">Login</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-box">
    <h2>Create Account</h2>
    <p>Join CineBook and start booking tickets</p>

    <div class="alert alert-error" id="err-msg"></div>
    <div class="alert alert-success" id="ok-msg"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Your full name"/>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@email.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 6 characters"/>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat password"/>
    </div>

    <button class="btn btn-primary btn-full" onclick="register()">Create Account</button>
    <p style="text-align:center;margin-top:1.2rem;font-size:0.88rem;color:var(--muted)">
      Already have an account? <a href="login.html">Login here</a>
    </p>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api';

function showError(msg) {
  const el = document.getElementById('err-msg');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('ok-msg').classList.remove('show');
}
function showSuccess(msg) {
  const el = document.getElementById('ok-msg');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('err-msg').classList.remove('show');
}

async function register() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;

  if (!name || !email || !password) return showError('Please fill in all fields');
  if (password.length < 6) return showError('Password must be at least 6 characters');
  if (password !== confirm) return showError('Passwords do not match');

  try {
    const res = await fetch(`${API}/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if (!res.ok) return showError(data.error || 'Registration failed');
    showSuccess('Account created! Redirecting to login...');
    setTimeout(() => location.href = 'login.html', 1200);
  } catch(e) {
    showError('Cannot connect to server. Make sure backend is running.');
  }
}
</script>
</body>
</html>
